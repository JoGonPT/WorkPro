<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Work Pro Mobile</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- PERSISTENT ALERTA BANNER (Sticky 4h Alert) -->
    <div id="sticky-alert" class="persistent-banner" style="display: none;">
        <div class="banner-content">
            <span class="banner-icon">⚠️</span>
            <div class="banner-text">
                <span id="alert-msg">Serviço em 4 Horas: Natação</span>
            </div>
            <button class="banner-btn" id="dismiss-alert">LIDO</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Main Scrollable Content -->
        <main class="main-content">
            
            <!-- VIEW: HOJE -->
            <section id="view-today" class="spa-view active">
                <header class="view-header">
                    <h1 class="view-title">Hoje</h1>
                    <span id="current-date" class="view-subtitle">Carregando...</span>
                </header>
                <div id="today-list" class="list-container">
                    <!-- Eventos do Dia JS -->
                </div>
            </section>

            <!-- VIEW: SEMANA (Lista Segmentada) -->
            <section id="view-week" class="spa-view">
                <header class="view-header">
                    <h1 class="view-title">Semana</h1>
                </header>
                <div id="week-container" class="week-list">
                    <!-- Segmentos de Segunda a Domingo JS -->
                </div>
            </section>

            <!-- VIEW: MÊS (Grelha com Pontos) -->
            <section id="view-month" class="spa-view">
                <header class="view-header">
                    <h1 class="view-title">Mês</h1>
                </header>
                <div id="month-grid" class="calendar-grid-v2">
                    <!-- Grelha compacta com indicadores de tarefas JS -->
                </div>
            </section>

            <!-- VIEW: TAREFAS -->
            <section id="view-tasks" class="spa-view">
                <header class="view-header">
                    <h1 class="view-title">Tarefas</h1>
                </header>
                <div id="tasks-list" class="list-container">
                    <!-- Tarefas Rápidas JS -->
                </div>
            </section>

            <!-- VIEW: GESTÃO (Admin Integrado) -->
            <section id="view-admin" class="spa-view">
                <header class="view-header">
                    <h1 class="view-title">Gestão</h1>
                </header>
                <div class="admin-form">
                    <div class="input-group">
                        <label>Título do Serviço</label>
                        <input type="text" id="adm-title" placeholder="Ex: Manutenção Servidor">
                    </div>
                    <div class="input-group">
                        <label>Data e Hora</label>
                        <div class="row-inputs">
                            <input type="date" id="adm-date">
                            <input type="time" id="adm-time">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Notas</label>
                        <textarea id="adm-notes" placeholder="Detalhes..."></textarea>
                    </div>
                    <div class="toggle-group">
                        <span>Ativar Alerta 4h</span>
                        <label class="switch">
                            <input type="checkbox" id="adm-alert" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button id="save-btn" class="primary-btn">SALVAR NO FIREBASE</button>
                </div>
            </section>

        </main>

        <!-- BOTTOM TAB BAR (PWA) -->
        <nav class="tab-bar">
            <button class="tab-item active" data-target="view-today">
                <span class="icon">🔘</span><span class="label">Hoje</span>
            </button>
            <button class="tab-item" data-target="view-week">
                <span class="icon">📅</span><span class="label">Semana</span>
            </button>
            <button class="tab-item" data-target="view-month">
                <span class="icon">🗓️</span><span class="label">Mês</span>
            </button>
            <button class="tab-item" data-target="view-tasks">
                <span class="icon">✅</span><span class="label">Tarefas</span>
            </button>
            <button class="tab-item" data-target="view-admin">
                <span class="icon">🔨</span><span class="label">Gestão</span>
            </button>
        </nav>
    </div>

    <!-- GLOBAL DETAILS / EDIT MODAL -->
    <div id="details-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="dtl-title-display">Título do Serviço</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            
            <div id="dtl-view-mode">
                <p class="dtl-info">📅 <span id="dtl-date">--</span> às <span id="dtl-time">--</span></p>
                <div class="dtl-notes-box">
                    <label>Notas:</label>
                    <p id="dtl-notes">Sem notas registradas.</p>
                </div>
                <div class="dtl-alert-badge" id="dtl-alert-status">🔔 Alerta 4h ATIVO</div>
                
                <div class="modal-footer-actions">
                    <button class="edit-btn" onclick="toggleEditMode(true)">✏️ Editar</button>
                    <button class="delete-btn" onclick="confirmDelete()">🗑️ Eliminar</button>
                </div>
            </div>

            <div id="dtl-edit-mode" style="display: none;">
                <div class="input-group">
                    <input type="text" id="edit-title">
                </div>
                <div class="row-inputs">
                    <input type="date" id="edit-date">
                    <input type="time" id="edit-time">
                </div>
                <textarea id="edit-notes"></textarea>
                <div class="toggle-group" style="background: rgba(255,255,255,0.03);">
                    <span>Alerta 4h</span>
                    <label class="switch">
                        <input type="checkbox" id="edit-alert">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="save-changes-btn" onclick="saveChanges()">GUARDAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // Service Worker Register
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('WorkPro Online'))
                    .catch(err => console.log('Offline Fail'));
            });
        }
    </script>
</body>
</html>
